<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたん求人検索（松山版）</title>
<style type="text/css">
  /* 全体設定 */
  #hw-search-tool-root { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; margin: 0; background-color: #f9f9f9; text-align: left; }
  #hw-search-tool-root #wrapper { max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding-bottom: 80px; box-sizing: border-box; position: relative; overflow-x: hidden; }
  
  /* 案内文 */
  #hw-search-tool-root .intro-text { font-size: 15px; color: #333; background: #f4f4f4; padding: 15px; border-radius: 5px; margin-bottom: 20px; line-height: 1.6; }
  #hw-search-tool-root .caution-text { color: #d32f2f; font-weight: bold; font-size: 0.95em; display: block; margin-bottom: 5px; }
  
  /* HWISボタン */
  #hw-search-tool-root .hwis-guide-box { margin-top: 5px; text-align: center; }
  #hw-search-tool-root .hwis-link-btn { display: inline-block; background: #f0f7ff; color: #0055b3; border: 3px solid #0066cc; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 16px; transition: all 0.2s; }
  #hw-search-tool-root .hwis-link-btn:active { background: #e6f0fa; transform: translateY(2px); }

  /* ヘルプボタン */
  #hw-search-tool-root .floating-help-btn { position: fixed; top: 15px; right: 15px; z-index: 9999; background-color: #ff9800; color: #ffffff !important; font-weight: bold; font-size: 13px; padding: 10px 16px; border-radius: 25px; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); opacity: 0.95; cursor: pointer; }
  
  /* モーダル（ポップアップ）共通設定 */
  #hw-search-tool-root .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
  
  /* メッセージモーダルのレイアウト修正 */
  #hw-search-tool-root .modal-content-msg { background-color: #fff; width: 100%; max-width: 360px; padding: 25px 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: center; animation: popIn 0.2s ease-out; box-sizing: border-box; }
  #hw-search-tool-root .modal-content-help { background-color: #fff; width: 100%; max-width: 500px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 85vh; overflow-y: auto; position: relative; animation: popIn 0.2s ease-out; }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  #hw-search-tool-root .msg-title { font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 12px; }
  #hw-search-tool-root .msg-body { font-size: 14px; color: #444; line-height: 1.6; margin-bottom: 25px; text-align: left; }
  
  /* ▼ 修正：ボタンを1行に収めるためのCSS */
  #hw-search-tool-root .msg-buttons { display: flex; justify-content: center; gap: 10px; width: 100%; }
  #hw-search-tool-root .btn-ok { background: #008000; color: #fff; border: none; padding: 12px 5px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; flex: 1; white-space: nowrap; min-width: 0; }
  #hw-search-tool-root .btn-cancel { background: #ccc; color: #333; border: none; padding: 12px 5px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; flex: 1; white-space: nowrap; min-width: 0; }

  /* UI要素（セクション等） */
  #hw-search-tool-root .section { margin-top: 2.5em; font-weight: bold; border-bottom: 2px solid #008000; padding-bottom: 5px; margin-bottom: 15px; color: #333; font-size: 1.1em; }
  #hw-search-tool-root .grid-container { display: flex; flex-wrap: wrap; gap: 8px; }
  #hw-search-tool-root .grid-item-2 { flex: 1 1 calc(50% - 8px); }
  #hw-search-tool-root .grid-item-full { flex: 1 1 100%; }
  #hw-search-tool-root .btn-base { display: flex; align-items: center; justify-content: center; padding: 5px; text-align: center; cursor: pointer; box-sizing: border-box; font-size: 15px; font-weight: bold; border-radius: 8px; text-decoration: none; min-height: 60px; line-height: 1.3; width: 100%; border: 2px solid transparent; transition: all 0.2s; }
  #hw-search-tool-root .area-btn { background: #fff; color: #008000; border: 2px solid #008000; }
  #hw-search-tool-root .area-btn.active { background: #008000 !important; color: #fff !important; }
  #hw-search-tool-root .chkLabel { background: #fff; color: #008000; border: 1px solid #008000; }
  #hw-search-tool-root input:checked + .chkLabel { background: #d0f0c0 !important; border: 2px solid #008000 !important; }
  #hw-search-tool-root input[type="checkbox"], #hw-search-tool-root input[type="radio"] { display: none; }
  
  /* スマホ対応 */
  @media screen and (max-width: 600px) {
    #hw-search-tool-root #wrapper { padding: 10px 5px; width: 100%; padding-bottom: 140px; }
    #hw-search-tool-root .searchbutton { position: fixed; bottom: 0; left: 0; width: 100%; border-radius: 0; z-index: 999; padding: 20px; }
  }
</style>

<script type="text/javascript">
  var amp = String.fromCharCode(38);
  var selectedAreaKeys = [];
  var areaData = {
    "matsuyama_all": { name: "松山市全域", code: "38201", words: "" },
    "east":  { name: "城東・中央", code: "38201", words: "一番町　二番町　三番町" },
    "iyo":    { name: "伊予市",     code: "38210", words: "" }
    /* 他のエリアデータは省略していますが、本番用では保持してください */
  };

  function showMyModal(title, htmlText, isConfirm, callback) {
    var overlay = document.getElementById('msg-modal-overlay');
    document.getElementById('msg-modal-title').innerText = title;
    document.getElementById('msg-modal-text').innerHTML = htmlText; // 画像表示のためにinnerHTMLを使用
    
    var btnOk = document.getElementById('msg-btn-ok');
    var btnCancel = document.getElementById('msg-btn-cancel');
    
    if(isConfirm) {
        btnCancel.style.display = 'block';
        btnOk.innerText = "ハローワークへ進む";
    } else {
        btnCancel.style.display = 'none';
        btnOk.innerText = "OK";
    }
    overlay.style.display = 'flex';
    btnOk.onclick = function() { overlay.style.display = 'none'; if(callback) callback(true); };
    btnCancel.onclick = function() { overlay.style.display = 'none'; if(callback) callback(false); };
  }

  function executeMySearch() {
    var params = ""; // 実際にはここで各チェックボックスの値を収集するロジックが入ります
    
    var performOpen = function() {
        var finalUrl = "https://www.hellowork.mhlw.go.jp/kensaku/GECA110010.do?action=searchShosaiBtn" 
                     + amp + "screenId=GECA110010" 
                     + amp + "searchClear=1" 
                     + amp + "kjKbnRadioBtn=1" 
                     + params;
        finalUrl += amp + "openExternalBrowser=1";
        window.location.href = finalUrl;
    };

    // ▼ ご提供いただいたGoogle Drive画像を組み込んだ案内文
    var confirmMsg = "ハローワークの「詳しい条件で検索」画面へ移動します。<br>"
                   + "（選択した条件は自動で入力されています）<br><br>"
                   + "移動先の画面を少し下へ動かし、緑色の<strong>【検索する】</strong>ボタンをタップしてください。<br><br>"
                   + "<img src='https://drive.google.com/uc?id=1FLs_4qqKrSMuibNarNuuh3bzM712wi5W' style='width:100%; border:1px solid #ddd; border-radius:8px;' alt='操作案内'>";

    showMyModal("検索の進め方", confirmMsg, true, function(result){
        if(result) performOpen();
    });
  }
  
  function openHelp() { document.getElementById('help-modal').style.display = 'flex'; }
  function closeHelp() { document.getElementById('help-modal').style.display = 'none'; }
  function selectArea(k) { selectedAreaKeys = [k]; updateConditionText(); }
  function updateConditionText() { document.getElementById('current-conditions-text').innerText = "選択中: " + selectedAreaKeys.join(","); }
  function saveConditions() { alert("保存しました"); }
  function resetAll() { location.reload(); }
</script>
</head>
<body>

<div id="hw-search-tool-root">
  <div id="wrapper">
    <a class="floating-help-btn" onclick="openHelp(); return false;">？ 利用方法</a>

    <div class="intro-text">
      ハローワーク松山管轄の求人を簡単に検索できます。
    </div>

    <div class="section">1. 地区を選択</div>
    <div class="grid-container">
      <div class="grid-item-2"><a href="javascript:void(0);" onclick="selectArea('matsuyama_all');" class="btn-base area-btn">松山市全域</a></div>
      <div class="grid-item-2"><a href="javascript:void(0);" onclick="selectArea('iyo');" class="btn-base area-btn">伊予市</a></div>
    </div>

    <div class="condition-summary">
      <div class="condition-summary-title">現在の検索条件</div>
      <div id="current-conditions-text">指定なし</div>
      <div class="save-btn-container">
        <button class="save-btn" onclick="saveConditions()">この条件を保存</button>
        <button class="save-btn" onclick="resetAll()">リセット</button>
      </div>
    </div>

    <a class="searchbutton" href="javascript:void(0);" onclick="executeMySearch()">この条件で検索する</a>
  </div>

  <div id="help-modal" class="modal-overlay" onclick="if(event.target == this) closeHelp();">
    <div class="modal-content-help">
      <div class="modal-header"><span>ご利用案内</span><button class="modal-close-btn" onclick="closeHelp()">×</button></div>
      <div class="help-notes"><p class="help-note-item">詳しい使い方の説明です。</p></div>
    </div>
  </div>

  <div id="msg-modal-overlay" class="modal-overlay">
    <div class="modal-content-msg">
      <div id="msg-modal-title" class="msg-title"></div>
      <div id="msg-modal-text" class="msg-body"></div>
      <div class="msg-buttons">
          <button id="msg-btn-cancel" class="btn-cancel">キャンセル</button>
          <button id="msg-btn-ok" class="btn-ok">ハローワークへ進む</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
