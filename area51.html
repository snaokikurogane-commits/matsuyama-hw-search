<style type="text/css">
  #hw-search-tool-root { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; margin: 0; background-color: #f9f9f9; text-align: left; }
  #hw-search-tool-root #wrapper { max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding-bottom: 80px; box-sizing: border-box; position: relative; overflow-x: hidden; }
  
  /* モーダル共通設定 */
  #hw-search-tool-root .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
  
  /* メッセージモーダルのレイアウト：画像を横幅いっぱいに */
  #hw-search-tool-root .modal-content-msg { background-color: #fff; width: 100%; max-width: 360px; padding: 25px 0 20px 0; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: center; animation: popIn 0.2s ease-out; overflow: hidden; }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  #hw-search-tool-root .msg-text-container { padding: 0 20px; }
  #hw-search-tool-root .msg-title { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 12px; }
  #hw-search-tool-root .msg-body { font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 20px; }
  
  /* 画像の左右空白をなくす設定 */
  #hw-search-tool-root .msg-guide-img { width: 100%; height: auto; display: block; margin: 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
  
  /* ▼ 修正：ボタンの横幅をさらに伸ばす（flex比率の変更） */
  #hw-search-tool-root .msg-buttons { display: flex; justify-content: center; gap: 10px; padding: 20px 15px 0 15px; }
  #hw-search-tool-root .btn-ok { background: #008000; color: #fff !important; border: none; padding: 12px 5px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1.5; white-space: nowrap; } /* 1.2から1.5へ拡大 */
  #hw-search-tool-root .btn-cancel { background: #ccc; color: #333 !important; border: none; padding: 12px 5px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 0.5; white-space: nowrap; } /* 0.8から0.5へ縮小 */

  /* UI基本パーツ */
  .grid-container { display: flex; flex-wrap: wrap; gap: 8px; }
  .grid-item-2 { flex: 1 1 calc(50% - 8px); }
  .btn-base { display: flex; align-items: center; justify-content: center; padding: 5px; text-align: center; cursor: pointer; box-sizing: border-box; font-size: 15px; font-weight: bold; border-radius: 8px; text-decoration: none; min-height: 60px; line-height: 1.3; width: 100%; border: 2px solid transparent; transition: all 0.2s; }
  .area-btn { background: #fff; color: #008000; border: 2px solid #008000; }
  .area-btn.active { background: #008000 !important; color: #fff !important; }
  .searchbutton { display: block; width: 100%; padding: 20px; background: #008000; color: #fff !important; text-align: center; font-size: 24px; font-weight: bold; border-radius: 12px; margin-top: 15px; text-decoration: none; box-sizing: border-box; }
  input[type="checkbox"], input[type="radio"] { display: none; }
  .chkLabel { background: #fff; color: #008000; border: 1px solid #008000; }
  input:checked + .chkLabel { background: #d0f0c0 !important; border: 2px solid #008000 !important; }
  .section { margin-top: 2em; font-weight: bold; border-bottom: 2px solid #008000; padding-bottom: 5px; margin-bottom: 15px; color: #333; }
</style>

<script type="text/javascript">
  var amp = String.fromCharCode(38);
  var selectedAreaKeys = [];

  function showMyModal(title, bodyHtml, isConfirm, callback) {
    var overlay = document.getElementById('msg-modal-overlay');
    document.getElementById('msg-modal-title').innerText = title;
    document.getElementById('msg-modal-text-content').innerHTML = bodyHtml;
    var btnOk = document.getElementById('msg-btn-ok');
    var btnCancel = document.getElementById('msg-btn-cancel');
    overlay.style.display = 'flex';
    btnOk.onclick = function() { overlay.style.display = 'none'; if(callback) callback(true); };
    btnCancel.onclick = function() { overlay.style.display = 'none'; if(callback) callback(false); };
  }

  function executeMySearch() {
    var params = ""; // 検索条件収集ロジック

    var performOpen = function() {
        var finalUrl = "https://www.hellowork.mhlw.go.jp/kensaku/GECA110010.do?action=searchShosaiBtn" 
                     + amp + "screenId=GECA110010" 
                     + amp + "searchClear=1" 
                     + amp + "kjKbnRadioBtn=1" 
                     + params;
        window.location.href = finalUrl;
    };

    // ▼ 修正：タイトルを信頼感のあるものに、本文を「最下部」という表現に変更
    var modalTitle = "ハローワーク公式サイトで検索";
    var confirmHtml = "<div class='msg-text-container'>"
                    + "<div class='msg-body'><b>ハローワークインターネットサービスの<br>詳細検索画面へ移動します。</b><br>"
                    + "<span style='font-size:13px; color:#d32f2f;'>（選択した条件は自動で入力されています）</span><br><br>"
                    + "移動先の画面を<b>一番下（最下部）</b>まで進み、緑色の<br>"
                    + "<span style='display:inline-block; background:#1e703d; color:#fff; padding:6px 15px; border-radius:4px; font-weight:bold; margin:5px 0;'>🔍 検索する</span><br>"
                    + "ボタンを押して検索を完了してください。</div></div>"
                    + "<img src='./search-guide.png' class='msg-guide-img' alt='操作案内' onerror=\"this.src='https://placehold.jp/24/f4f4f4/666/400x200.png?text=search-guide.pngをアップロードしてください';\">";

    showMyModal(modalTitle, confirmHtml, true, function(result){
        if(result) performOpen();
    });
  }

  function selectArea(k) { selectedAreaKeys = [k]; }
</script>

<div id="hw-search-tool-root">
  <div id="wrapper">
    <div class="section">1. 地区を選択</div>
    <div class="grid-container">
      <div class="grid-item-2"><a href="javascript:void(0);" onclick="selectArea('matsuyama_all');" class="btn-base area-btn">松山市全域</a></div>
    </div>
    <a class="searchbutton" href="javascript:void(0);" onclick="executeMySearch()">この条件で検索する</a>
  </div>

  <div id="msg-modal-overlay" class="modal-overlay">
    <div class="modal-content-msg">
      <div id="msg-modal-title" class="msg-title" style="padding:0 20px;"></div>
      <div id="msg-modal-text-content"></div>
      <div class="msg-buttons">
          <button id="msg-btn-cancel" class="btn-cancel">戻る</button>
          <button id="msg-btn-ok" class="btn-ok">公式画面へ進む</button>
      </div>
    </div>
  </div>
</div>
